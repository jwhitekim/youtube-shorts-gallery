<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>YouTube Shorts 썸네일 모음</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="auth-section" style="display:none; text-align:center; padding: 60px 40px;">
    <h1>YouTube Shorts 갤러리</h1>
    <p>좋아요 누른 Shorts를 자동으로 모아봅니다.</p>
    <a href="/auth/login" class="login-button">Google로 로그인</a>
  </div>

  <div id="app-section" style="display:none;">
    <h1>YouTube Shorts 썸네일 모음</h1>
    <div id="sync-status"></div>
    <div class="grid" id="videoGrid"></div>
    <div class="controls">
      <button id="copyAll">전체 링크 복사</button>
      <button id="logoutBtn">로그아웃</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
