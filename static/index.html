<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shorts Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="auth-section" style="display:none">
    <div class="auth-center">
      <div class="auth-logo">
        <svg width="40" height="28" viewBox="0 0 40 28" fill="none">
          <rect width="40" height="28" rx="8" fill="#FF0000"/>
          <path d="M17 9L27 14L17 19V9Z" fill="white"/>
        </svg>
        <span class="auth-logo-text">Shorts Archive</span>
      </div>
      <p class="auth-desc">좋아요 누른 YouTube Shorts를<br>자동으로 아카이브합니다.</p>
      <a href="/auth/login" class="login-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google로 로그인
      </a>
    </div>
  </div>

  <div id="app-section" style="display:none">
    <header class="app-header">
      <div class="header-brand">
        <svg width="28" height="20" viewBox="0 0 28 20" fill="none">
          <rect width="28" height="20" rx="5" fill="#FF0000"/>
          <path d="M12 6L19 10L12 14V6Z" fill="white"/>
        </svg>
        <span>Shorts Archive</span>
      </div>
      <div id="sync-status"></div>
      <div class="header-actions">
        <button id="copyAll">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          전체 복사
        </button>
        <button id="logoutBtn">로그아웃</button>
      </div>
    </header>

    <div class="grid" id="videoGrid"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
